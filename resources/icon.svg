<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141008"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5b84a"/>
      <stop offset="100%" stop-color="#c47a18"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- ambient glow behind bars -->
  <ellipse cx="256" cy="256" rx="150" ry="90" fill="#e8a038" fill-opacity="0.07"/>

  <!-- waveform bars, centered at y=256, step=30 (width=18, gap=12) -->
  <!-- heights: 36 64 100 148 200 168 224 168 200 148 100 64 36 -->
  <!-- x start = (512 - 13*30 + 12) / 2 = (512 - 378) / 2 = 67 -->
  <g fill="url(#barGrad)" filter="url(#glow)" clip-path="url(#roundedClip)">
    <rect x="67"  y="238" width="18" height="36"  rx="9"/>
    <rect x="97"  y="224" width="18" height="64"  rx="9"/>
    <rect x="127" y="206" width="18" height="100" rx="9"/>
    <rect x="157" y="182" width="18" height="148" rx="9"/>
    <rect x="187" y="156" width="18" height="200" rx="9"/>
    <rect x="217" y="172" width="18" height="168" rx="9"/>
    <rect x="247" y="144" width="18" height="224" rx="9"/>
    <rect x="277" y="172" width="18" height="168" rx="9"/>
    <rect x="307" y="156" width="18" height="200" rx="9"/>
    <rect x="337" y="182" width="18" height="148" rx="9"/>
    <rect x="367" y="206" width="18" height="100" rx="9"/>
    <rect x="397" y="224" width="18" height="64"  rx="9"/>
    <rect x="427" y="238" width="18" height="36"  rx="9"/>
  </g>

  <!-- subtle reflection / floor glow -->
  <ellipse cx="256" cy="380" rx="130" ry="16" fill="#e8a038" fill-opacity="0.12"/>
</svg>
